apiVersion: 1

datasources:
  - name: Lucenia
    type: grafana-opensearch-datasource
    access: proxy
    url: https://lucenia-node:9200
    basicAuth: true
    basicAuthUser: admin
    secureJsonData:
      basicAuthPassword: MyStrongPassword123_
    jsonData:
      flavor: "opensearch"
      version: "2.14.0"
      timeField: "@timestamp"
      tlsSkipVerify: true
      database: "fluentbit-*"
    isDefault: true
