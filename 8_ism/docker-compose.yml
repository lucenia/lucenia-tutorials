name: lucenia-ism
services:
  lucenia-node:
    image: registry.digitalocean.com/lucenia/lucenia:0.11.0
    container_name: lucenia-node
    environment:
      - cluster.name=lucenia-cluster
      - node.name=lucenia-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "LUCENIA_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - plugins.license.certificate_filepath=config/trial.crt
      - LUCENIA_INITIAL_ADMIN_PASSWORD=MyStrongPassword@123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - lucenia-data:/usr/share/lucenia/data
      - ./node/config/lucenia.yml:/usr/share/lucenia/config/lucenia.yml
      - ./node/config/trial.crt:/usr/share/lucenia/config/trial.crt
    ports:
      - 9200:9200
    networks:
      - lucenia-net

volumes:
  lucenia-data:

networks:
  lucenia-net:
